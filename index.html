<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المنصة الآمنة</title>
    <style>
        /* الستايل الأساسي للمنصة - لم يتم تغيير أي حاجة فيه */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
        }
        .platform-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 50px;
        }
        .icon-box {
            background: #fff;
            padding: 30px 40px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            cursor: pointer;
            text-align: center;
            transition: transform 0.2s;
        }
        .icon-box:hover {
            transform: translateY(-5px);
        }
        .icon-box h2 { margin: 10px 0 0; color: #333; }
        .icon-box .icon { font-size: 40px; }
        
        /* ستايل شاشة المشترك (إدخال الكود) */
        #subscriber-screen {
            display: none;
            text-align: center;
            margin-top: 50px;
        }
        #subscriber-screen input {
            padding: 15px;
            font-size: 18px;
            border: 2px solid #ccc;
            border-radius: 8px;
            width: 300px;
        }
        #subscriber-screen button {
            padding: 15px 30px;
            font-size: 18px;
            background: #007bff;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- الواجهة الرئيسية (لم ألمسها، زي ما هي بالظبط) -->
    <div class="platform-container" id="main-screen">
        <div class="icon-box" id="btn-manager">
            <div class="icon">🛡️</div>
            <h2>المدير</h2>
        </div>
        <div class="icon-box" id="btn-subscriber">
            <div class="icon">👤</div>
            <h2>المشترك</h2>
        </div>
        <div class="icon-box" id="btn-register">
            <div class="icon">📝</div>
            <h2>تسجيل جديد</h2>
        </div>
    </div>

    <!-- شاشة إدخال الكود للمشترك -->
    <div id="subscriber-screen">
        <h2>أدخل كود المشترك</h2>
        <input type="text" id="code-input" placeholder="الكود هنا...">
        <button id="check-code-btn">تسجيل الدخول</button>
    </div>

    <!-- الشاشة الخضراء لم يتم كتابتها هنا في الـ HTML، سيتم بناؤها ديناميكياً (Dynamic DOM Injection) -->

    <script>
        // 1. إدارة الشاشات الأساسية (بدون أي تغيير على المنطق القديم)
        const mainScreen = document.getElementById('main-screen');
        const subScreen = document.getElementById('subscriber-screen');

        document.getElementById('btn-manager').addEventListener('click', () => {
            alert('تم الدخول لواجهة المدير بنجاح!');
        });

        document.getElementById('btn-subscriber').addEventListener('click', () => {
            mainScreen.style.display = 'none';
            subScreen.style.display = 'block';
        });

        document.getElementById('btn-register').addEventListener('click', () => {
            alert('تم فتح شاشة تسجيل جديد بنجاح!');
        });

        // 2. منطق المشترك (Dynamic DOM Injection للشاشة الخضراء)
        document.getElementById('check-code-btn').addEventListener('click', () => {
            const code = document.getElementById('code-input').value;
            if (code.trim() !== '') {
                // إخفاء شاشة الإدخال
                subScreen.style.display = 'none';
                
                // بناء الشاشة الخضراء من الصفر (Dynamic Injection)
                const greenOverlay = document.createElement('div');
                greenOverlay.id = 'dynamic-green-screen';
                greenOverlay.style.cssText = 'position:fixed; top:0; left:0; width:100%; height:100%; background:linear-gradient(135deg, #2ecc71, #27ae60); z-index:9999; display:flex; flex-direction:column; justify-content:center; align-items:center;';
                
                greenOverlay.innerHTML = `
                    <h1 style="color:white; font-size:4rem; margin-bottom:20px;">تم التفعيل بنجاح!</h1>
                    <p style="color:white; font-size:1.5rem; margin-bottom:40px;">مرحباً بك في المنصة، الكود الخاص بك يعمل بكفاءة</p>
                    <button data-action="pay" style="padding:20px 50px; font-size:24px; background:#fff; color:#27ae60; border:none; border-radius:10px; cursor:pointer; font-weight:bold; margin-bottom:20px;">تفعيل السداد</button>
                    <button data-action="delete" style="padding:10px 20px; font-size:16px; background:transparent; color:#fff; border:2px solid #fff; border-radius:8px; cursor:pointer;">حذف المشترك</button>
                `;

                document.body.appendChild(greenOverlay);
            } else {
                alert('الرجاء إدخال الكود!');
            }
        });

        // 3. Global Document Delegation (مراقبة كل الضغطات على مستوى الصفحة كلها)
        document.addEventListener('click', function(e) {
            // استخدام e.target.closest لضمان اصطياد الزرار حتى لو كان بداخله أيقونة أو سبان
            const targetBtn = e.target.closest('[data-action]');
            
            if (!targetBtn) return; // لو الضغطة مش على زرار تابع لنا، اخرج

            const action = targetBtn.dataset.action;

            if (action === 'pay') {
                handlePayment();
            } else if (action === 'delete') {
                handleDelete();
            }
        });

        // 4. LocalStorage Protection (الذاكرة المضمونة)
        function safeSave(key, data) {
            try {
                localStorage.setItem(key, JSON.stringify(data));
                console.log('تم الحفظ في الذاكرة بنجاح');
            } catch (error) {
                console.error('خطأ في الذاكرة:', error);
                // في حال المتصفح قافل الذاكرة أو الذاكرة ممتلئة
                alert('تنبيه: السداد تم بنجاح، لكن متصفحك يمنع حفظ البيانات المحلية (LocalStorage).');
            }
        }

        function handlePayment() {
            // منطق السداد
            const paymentData = { status: 'paid', time: new Date().toLocaleString() };
            safeSave('subscriber_payment', paymentData);
            
            // تغيير شكل الزرار بعد السداد
            const payBtn = document.querySelector('[data-action="pay"]');
            if(payBtn) {
                payBtn.textContent = 'تم السداد بنجاح ✅';
                payBtn.style.background = '#d4edda';
                payBtn.style.color = '#155724';
                payBtn.style.pointerEvents = 'none'; // تعطيل الضغط عليه تاني
            }
        }

        function handleDelete() {
            if(confirm('هل أنت متأكد من حذف المشترك؟')) {
                safeSave('subscriber_payment', null); // مسح البيانات
                const greenScreen = document.getElementById('dynamic-green-screen');
                if(greenScreen) greenScreen.remove(); // إزالة الشاشة الخضراء
                mainScreen.style.display = 'flex'; // الرجوع للواجهة الرئيسية
            }
        }
    </script>
</body>
</html>
